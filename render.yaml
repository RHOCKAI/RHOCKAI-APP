services:
  - type: web
    name: rhockai-backend
    env: docker
    region: ohio
    plan: free
    dockerContext: .
    dockerfilePath: Dockerfile
    preDeployCommand: alembic -c backend/alembic/alembic.ini upgrade head
    envVars:
      - key: DATABASE_URL
        sync: false # User will provide Supabase URL manually
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PROJECT_NAME
        value: "Rhockai Intelligence API"
      - key: LOG_LEVEL
        value: INFO
