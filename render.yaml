services:
  - type: web
    name: rhockai-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    preDeployCommand: alembic -c alembic/alembic.ini upgrade head
    plan: free # or starter
    region: oregon # or your preferred region
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rhockai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: ALLOWED_ORIGINS
        value: '["*"]' # Allow all for production mobile apps initially, or specific frontend URL
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PROJECT_NAME
        value: "Rhockai Intelligence API"
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: rhockai-db
    plan: free # Note: Render free tier DB expires after 90 days. For production, use Starter.
    databaseName: rhockai_db
    user: workout_user
