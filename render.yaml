services:
  - type: web
    name: rhockai-backend
    env: docker
    rootDirectory: backend
    repo: https://github.com/RHOCKAI/RHOCKAI-APP
    region: ohio
    plan: free
    dockerContext: .
    dockerfilePath: Dockerfile
    preDeployCommand: alembic -c alembic/alembic.ini upgrade head
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rhockai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PROJECT_NAME
        value: "Rhockai Intelligence API"
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: rhockai-db
    plan: free
    databaseName: rhockai_db
    user: workout_user
